networks:
  internal:
    name: internal
    external: false
  dokploy-network:
    name: dokploy-network
    external: true

services:
  mealie:
    image: ghcr.io/mealie-recipes/mealie:${MEALIE_TAG:-v3.20.1} 
    container_name: mealie
    hostname: mealie
    restart: always
    pull_policy: always
    environment:
      MEALIE__DB_ENGINE: postgres
      MEALIE__DB_NAME: ${MEALIE_DB_NAME:-mealie}
      MEALIE__DB_USER: ${POSTGRES_USER:-media}
      MEALIE__DB_PASS: ${POSTGRES_PASSWORD:?err}
      MEALIE__DB_HOST: postgres
      MEALIE__DB_PORT: 5432
      MEALIE__SECRET_KEY: ${MEALIE_SECRET_KEY:?err}
      MEALIE__ALLOW_SIGNUP: ${MEALIE_ALLOW_SIGNUP:-true}
      MEALIE__DEFAULT_GROUP: Home
      MEALIE__TZ: ${TZ:-UTC}
    ports:
        - "127.0.0.1:9925:9000" 
    volumes:
      - mealie-data:/app/data/
    networks:
      - dokploy-network
      - internal
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mealie-data:
    name: mealie-data