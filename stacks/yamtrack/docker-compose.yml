services:
  yamtrack:
    image: ghcr.io/fuzzygrim/yamtrack:${YAMTRACK_TAG:-latest}
    container_name: yamtrack
    hostname: yamtrack
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-media}:${POSTGRES_PASSWORD:?err}@postgres:5432/${POSTGRES_DB:-media}
      REDIS_URL: redis://redis:6379
    ports:
      - 8000
    volumes:
      - yamtrack_data:/app/data
    networks:
      - dokploy-network
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  yamtrack_data:

networks:
  dokploy-network:
    external: true
